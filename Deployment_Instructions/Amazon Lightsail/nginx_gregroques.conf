# ──────────────────────────────────────────────
# HTTP → HTTPS redirect
# ──────────────────────────────────────────────
server {
    listen 80;
    server_name gregroques.com www.gregroques.com;
    return 301 https://$host$request_uri;
}

# ──────────────────────────────────────────────
# HTTPS
# ──────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name gregroques.com www.gregroques.com;

    # ── SSL (Certbot will populate these) ──
    ssl_certificate     /etc/letsencrypt/live/gregroques.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gregroques.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Static frontend ──
    root /var/www/gregroques;
    index index.html;

    # ── /resume redirect ──
    location = /resume {
        return 301 https://docs.google.com/document/d/e/2PACX-1vQbXTRzdV-BcC8i2GIAHkoCZ_nA4n3l3oNsjpguv29am3AyN2VGstlp2um-pzmR9uWFPoAkmJ905Wq3/pub;
    }

    # ── Proxy: contact form → Node.js ──
    location /personaldata {
        proxy_pass         http://127.0.0.1:2000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Proxy: Instagram feed → Node.js ──
    location /instagram {
        proxy_pass         http://127.0.0.1:2000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Proxy: Google Tag Manager ──
    location /gtag/ {
        proxy_pass         https://www.googletagmanager.com/gtag/;
        proxy_set_header   Host www.googletagmanager.com;
        proxy_ssl_server_name on;
    }

    # ── Frontend: serve static files, fallback to index.html ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── 404 fallback (if try_files doesn't match) ──
    error_page 404 /index.html;
}
